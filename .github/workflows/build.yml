name: Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > app/release.keystore
            echo "Keystore decoded successfully"
          else
            echo "No keystore secret found - will use debug signing fallback"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_FILE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && 'release.keystore' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Run Lint
        run: ./gradlew lintRelease --stacktrace

      - name: Upload Release APK (universal)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-universal
          path: app/build/outputs/apk/release/*-universal-*.apk
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Release APKs (ABI splits)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-abi-splits
          path: app/build/outputs/apk/release/*-arm64-v8a-*.apk
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-release.html
          retention-days: 7
          if-no-files-found: warn

      - name: Report APK Size
        if: always()
        run: |
          echo "## APK Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in app/build/outputs/apk/release/*.apk; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" | cut -f1)
              NAME=$(basename "$f")
              echo "- **$NAME**: $SIZE" >> $GITHUB_STEP_SUMMARY
            fi
          done
